name: Compatibility Check

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "tools/compat-check/**"
      - ".github/workflows/compat-check.yml"
      - "**/*.go"
      - "**/*.ts"
  pull_request:
    branches:
      - main
    paths:
      - "tools/compat-check/**"
      - ".github/workflows/compat-check.yml"
      - "**/*.go"
      - "**/*.ts"

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Set up Task
        uses: shuymn/github-actions/.github/actions/setup-task@47a0ccf882b365a190001c737ad38eeecaaae17a

      - name: Run compatibility check
        run: task compat-check
