name: GitHub Actions Lint

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/**
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/**

jobs:
  lint:
    permissions:
      contents: read
    uses: shuymn/github-actions/.github/workflows/gha.yml@65cae648d29f14837e0fbce3dcdbd13a52d101c0